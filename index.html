<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discovery Freelancer Wiki</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --accent: #58a6ff; --accent2: #f78166;
    --text: #e6edf3; --text2: #8b949e; --green: #3fb950;
    --yellow: #d29922; --purple: #bc8cff; --orange: #ffa657;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* NAV */
  nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 56px; position: sticky; top: 0; z-index: 100; }
  nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); white-space: nowrap; }
  nav .logo span { color: var(--accent2); }
  nav .nav-links { display: flex; gap: 4px; }
  nav .nav-links button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px 12px; border-radius: 6px; font-size: 0.9rem; transition: all .2s; }
  nav .nav-links button:hover, nav .nav-links button.active { background: var(--bg3); color: var(--text); }
  nav .search-wrap { flex: 1; max-width: 400px; margin-left: auto; position: relative; }
  nav .search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px 8px 36px; color: var(--text); font-size: 0.9rem; outline: none; }
  nav .search-wrap input:focus { border-color: var(--accent); }
  nav .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 0.85rem; }

  /* MAIN */
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero { text-align: center; padding: 48px 0 32px; }
  .hero h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--text2); margin-top: 10px; font-size: 1.05rem; }
  .hero .stats { display: flex; gap: 24px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
  .hero .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 28px; text-align: center; }
  .hero .stat .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .hero .stat .lbl { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }

  /* CARDS GRID */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .section-title { font-size: 1.3rem; font-weight: 700; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; color: var(--text2); cursor: pointer; transition: all .2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }

  /* CARD */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: border-color .2s, transform .2s; cursor: pointer; position: relative; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card.selected { border-color: var(--green); background: #0d2818; }
  .card .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .card .card-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .card .card-name { font-weight: 700; font-size: 1rem; }
  .card .card-sub { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
  .card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .card .tag { font-size: 0.72rem; padding: 3px 9px; border-radius: 12px; font-weight: 600; }
  .tag-laser    { background: #1f3a5f; color: #79c0ff; }
  .tag-plasma   { background: #3a1f5f; color: #d2a8ff; }
  .tag-particle { background: #1f3a2a; color: #56d364; }
  .tag-tachyon  { background: #5f3a1f; color: #ffa657; }
  .tag-neutron  { background: #5f1f1f; color: #ff7b72; }
  .tag-pulse    { background: #3a3a1f; color: #e3b341; }
  .tag-photon   { background: #1f4040; color: #39d0d0; }
  .tag-missile  { background: #3a2a1f; color: #f0883e; }
  .tag-neutral  { background: #21262d; color: #8b949e; }
  .tag-faction  { background: #1f2d3a; color: #58a6ff; }
  .tag-class    { background: #2a1f3a; color: #bc8cff; }

  .card .stat-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 4px 0; border-bottom: 1px solid var(--bg3); }
  .card .stat-row:last-child { border-bottom: none; }
  .card .stat-row .k { color: var(--text2); }
  .card .stat-row .v { font-weight: 600; }

  /* COMPARE BAR */
  .compare-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--accent); padding: 12px 24px; display: none; align-items: center; gap: 16px; z-index: 200; flex-wrap: wrap; }
  .compare-bar.show { display: flex; }
  .compare-bar .compare-items { display: flex; gap: 12px; flex: 1; flex-wrap: wrap; }
  .compare-bar .compare-chip { background: var(--bg3); border: 1px solid var(--accent); border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; display: flex; align-items: center; gap: 8px; }
  .compare-bar .compare-chip .rm { cursor: pointer; color: var(--accent2); font-weight: 700; }
  .compare-bar .compare-actions { display: flex; gap: 10px; }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: opacity .2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-danger  { background: var(--accent2); color: #fff; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }

  /* COMPARE MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 900px; max-height: 85vh; overflow-y: auto; padding: 28px; }
  .modal h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: var(--accent); }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .compare-table th { background: var(--bg3); padding: 10px 14px; text-align: left; font-weight: 700; border-bottom: 2px solid var(--border); }
  .compare-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .compare-table tr:hover td { background: var(--bg3); }
  .compare-table .highlight { color: var(--green); font-weight: 700; }

  /* COMPAT TABLE */
  .compat-grid { overflow-x: auto; }
  .compat-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 700px; }
  .compat-table th { background: var(--bg3); padding: 8px 10px; text-align: center; font-weight: 600; border: 1px solid var(--border); font-size: 0.78rem; }
  .compat-table th.row-h { text-align: left; min-width: 140px; }
  .compat-table td { padding: 7px 10px; border: 1px solid var(--border); text-align: center; }
  .compat-table td.faction-name { text-align: left; font-weight: 600; }
  .dot-full  { color: var(--green); font-size: 1.1rem; }
  .dot-part  { color: var(--yellow); font-size: 1.1rem; }
  .dot-none  { color: var(--bg3); font-size: 1.1rem; }

  /* SEARCH RESULTS */
  .search-results { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .search-results h3 { font-size: 1rem; color: var(--text2); margin-bottom: 14px; }
  .result-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .result-item:hover { background: var(--bg3); }
  .result-type { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
  .rt-weapon  { background: #5f3a1f; color: #ffa657; }
  .rt-faction { background: #1f2d3a; color: #58a6ff; }
  .rt-ship    { background: #1f3a2a; color: #56d364; }
  .no-results { color: var(--text2); font-style: italic; }

  /* DARKSTAT PANEL */
  .darkstat-panel { background: var(--bg2); border: 1px solid var(--accent); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .darkstat-panel h3 { color: var(--accent); font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .darkstat-panel p { color: var(--text2); font-size: 0.85rem; line-height: 1.6; }
  .darkstat-panel a { color: var(--accent); text-decoration: none; }
  .darkstat-panel a:hover { text-decoration: underline; }
  .darkstat-steps { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .step { display: flex; gap: 10px; align-items: flex-start; font-size: 0.83rem; }
  .step-num { background: var(--accent); color: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; flex-shrink: 0; margin-top: 1px; }

  @media (max-width: 600px) {
    nav { flex-wrap: wrap; height: auto; padding: 12px; gap: 10px; }
    nav .search-wrap { max-width: 100%; margin-left: 0; }
    .hero h1 { font-size: 1.6rem; }
    .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">DF<span>Wiki</span></div>
  <div class="nav-links">
    <button class="active" onclick="showPage('home',this)">Home</button>
    <button onclick="showPage('factions',this)">Factions</button>
